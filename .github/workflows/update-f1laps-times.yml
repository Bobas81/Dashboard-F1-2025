name: Update F1Laps times

on:
  workflow_dispatch:
  schedule:
    - cron: '20 5 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest F1Laps leaderboard times
        run: node scripts/update-f1laps-times.mjs

      - name: Commit updated times
        run: |
          if git diff --quiet -- public/data/f1laps-times.json; then
            echo "No F1Laps time changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/f1laps-times.json
          git commit -m "Update F1Laps leaderboard times"
          git push
